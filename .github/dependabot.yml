version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5

  - package-ecosystem: cargo
    directory: '/packages/cli-rs'
    schedule:
      interval: weekly
    groups:
      cargo-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
