name: Release Rust CLI

on:
  push:
    tags:
      - 'cli-rs-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: smokeping-config-linux-x86_64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: smokeping-config-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: smokeping-config-macos-x86_64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: smokeping-config-macos-aarch64
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: smokeping-config-windows-x86_64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Generate fresh catalog.json
        run: |
          npm ci
          npm -w @smokepingconf/core run prebuild

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for musl targets)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Stage catalog.json for cross build
        if: matrix.cross
        run: cp packages/core/src/catalog.json packages/cli-rs/catalog.json

      - name: Build (cross)
        if: matrix.cross
        working-directory: packages/cli-rs
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.cross'
        working-directory: packages/cli-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          src="packages/cli-rs/target/${TARGET}/release/smokeping-config"
          cp "$src" "${ARTIFACT}"
          chmod +x "${ARTIFACT}"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          src="packages/cli-rs/target/${TARGET}/release/smokeping-config.exe"
          cp "$src" "${ARTIFACT}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-rs-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    # Required so GitHub issues the OIDC token that
    # `rust-lang/crates-io-auth-action` exchanges for a crates.io token.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Generate fresh catalog.json
        run: |
          npm ci
          npm -w @smokepingconf/core run prebuild

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/cli-rs-v')
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_REF#cli-rs-v}"
          PKG_VERSION=$(cargo metadata --format-version 1 --no-deps --manifest-path packages/cli-rs/Cargo.toml | jq -r '.packages[0].version')
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_REF ($TAG_VERSION) does not match packages/cli-rs/Cargo.toml ($PKG_VERSION)"
            exit 1
          fi

      - name: Stage catalog.json for crates.io tarball
        run: cp packages/core/src/catalog.json packages/cli-rs/catalog.json

      - name: Cargo publish (dry-run)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/cli-rs
        run: cargo publish --dry-run --allow-dirty

      - name: Authenticate to crates.io (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/cli-rs-v')
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Cargo publish
        if: startsWith(github.ref, 'refs/tags/cli-rs-v')
        working-directory: packages/cli-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish --allow-dirty
