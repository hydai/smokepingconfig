name: Release smokeping-config

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    if: |
      (github.head_ref == 'release-cli-rs' && github.event.pull_request.merged == true)
      || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: smokeping-config-linux-x86_64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: smokeping-config-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: smokeping-config-macos-x86_64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: smokeping-config-macos-aarch64
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: smokeping-config-windows-x86_64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Generate fresh catalog.json
        run: |
          npm ci
          npm -w @smokepingconf/core run prebuild

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for musl targets)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Stage catalog.json for cross build
        if: matrix.cross
        run: cp packages/core/src/catalog.json packages/cli-rs/catalog.json

      - name: Build (cross)
        if: matrix.cross
        working-directory: packages/cli-rs
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.cross'
        working-directory: packages/cli-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          src="packages/cli-rs/target/${TARGET}/release/smokeping-config"
          cp "$src" "${ARTIFACT}"
          chmod +x "${ARTIFACT}"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          src="packages/cli-rs/target/${TARGET}/release/smokeping-config.exe"
          cp "$src" "${ARTIFACT}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    if: github.head_ref == 'release-cli-rs' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          version: 0.22.4

      - name: Run knope release
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Generate fresh catalog.json
        run: |
          npm ci
          npm -w @smokepingconf/core run prebuild

      - uses: dtolnay/rust-toolchain@stable

      - name: Stage catalog.json for crates.io tarball
        run: cp packages/core/src/catalog.json packages/cli-rs/catalog.json

      - name: Authenticate to crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@041cce5b4b821e6b0ebc9c9c38b58cac4e34dcc2 # v1.0.2

      - name: Cargo publish
        working-directory: packages/cli-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish --allow-dirty
