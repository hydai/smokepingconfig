[package]
name = "smokeping-config"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
description = "SmokePing config builder — render Targets files from a committable patch YAML on top of a versioned base catalogue"
repository = "https://github.com/hydai/smokepingconfig"
homepage = "https://github.com/hydai/smokepingconfig"
documentation = "https://docs.rs/smokeping-config"
readme = "README.md"
keywords = ["smokeping", "cli", "monitoring", "config", "targets"]
categories = ["command-line-utilities"]

[[bin]]
name = "smokeping-config"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"
uuid = { version = "1.23", features = ["v4"] }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "rustls", "json"] }
indexmap = { version = "2.14", features = ["serde"] }

[dev-dependencies]
assert_cmd = "2.2"
predicates = "3.1"
tempfile = "3.27"

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "z"
panic = "abort"

[profile.dev.package."*"]
debug = false
